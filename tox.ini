[tox]
envlist =
    py{310,311}-dj{42,52}
    py{312,313}-dj{42,52,60}

[testenv]
setenv =
    DJANGO_SETTINGS_MODULE = test_settings
deps =
    dj42: Django>=4.2,<5.0
    dj52: Django>=5.2,<5.3
    dj60: Django>=6.0,<6.1
    -rrequirements.txt
commands =
    # --top-level-directory=. is required: `xii` is a PEP 420 namespace
    # package (no __init__.py, shared with xii-django-river), and without
    # this flag unittest's dotted-label discovery auto-detects the
    # top-level dir by walking up from the label looking for __init__.py -
    # it stops one level too early at xii/django_river_admin (which does
    # have one) instead of continuing to xii/, and re-imports every test
    # module a second time under the wrong qualified name
    # (django_river_admin.tests.* instead of xii.django_river_admin.tests.*),
    # which then collides with the app registered under
    # xii.django_river_admin in INSTALLED_APPS.
    python manage.py test xii.django_river_admin --top-level-directory=.
